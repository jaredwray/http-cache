<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Old-school clustering versus http-cache global load balancing">
	<defs>
		<linearGradient id="bgL" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0" stop-color="#fef2f2"/><stop offset="1" stop-color="#fff7f7"/>
		</linearGradient>
		<linearGradient id="bgR" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#f5fbff"/>
		</linearGradient>
		<marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
			<path d="M0,0 L7,3 L0,6 z" fill="#2563eb"/>
		</marker>
	</defs>

	<style>
		.title { font-size: 19px; font-weight: 700; }
		.sub { font-size: 12px; fill: #64748b; }
		.node { font-size: 12.5px; font-weight: 600; }
		.small { font-size: 11px; }
		.tag { font-size: 11px; font-weight: 600; }
	</style>

	<!-- ============ LEFT: Old-school clustering ============ -->
	<rect x="16" y="16" width="492" height="588" rx="16" fill="url(#bgL)" stroke="#fecaca"/>
	<text x="40" y="50" class="title" fill="#b91c1c">Old-school clustering</text>
	<text x="40" y="70" class="sub">Single region · chatty replication · sticky sessions · brittle</text>
	<rect x="392" y="34" width="92" height="22" rx="11" fill="#fee2e2" stroke="#fca5a5"/>
	<text x="438" y="49" text-anchor="middle" class="tag" fill="#b91c1c">avoid</text>

	<!-- region box -->
	<rect x="44" y="92" width="436" height="372" rx="12" fill="#ffffff" stroke="#fecaca" stroke-dasharray="5 4"/>
	<text x="60" y="114" class="small" fill="#ef4444">Region: us-east-1 (the whole cluster lives here)</text>

	<!-- cache nodes mesh -->
	<g stroke="#f87171" stroke-width="1.6">
		<line x1="160" y1="190" x2="360" y2="190"/>
		<line x1="160" y1="190" x2="160" y2="330"/>
		<line x1="360" y1="190" x2="360" y2="330"/>
		<line x1="160" y1="330" x2="360" y2="330"/>
		<line x1="160" y1="190" x2="360" y2="330"/>
		<line x1="360" y1="190" x2="160" y2="330"/>
		<line x1="260" y1="150" x2="160" y2="190"/>
		<line x1="260" y1="150" x2="360" y2="190"/>
		<line x1="260" y1="150" x2="160" y2="330"/>
		<line x1="260" y1="150" x2="360" y2="330"/>
	</g>
	<g>
		<circle cx="260" cy="150" r="30" fill="#fee2e2" stroke="#ef4444"/>
		<text x="260" y="154" text-anchor="middle" class="node" fill="#991b1b">Node 1</text>
		<circle cx="160" cy="190" r="30" fill="#fee2e2" stroke="#ef4444"/>
		<text x="160" y="194" text-anchor="middle" class="node" fill="#991b1b">Node 2</text>
		<circle cx="360" cy="190" r="30" fill="#fee2e2" stroke="#ef4444"/>
		<text x="360" y="194" text-anchor="middle" class="node" fill="#991b1b">Node 3</text>
		<circle cx="160" cy="330" r="30" fill="#fee2e2" stroke="#ef4444"/>
		<text x="160" y="334" text-anchor="middle" class="node" fill="#991b1b">Node 4</text>
		<circle cx="360" cy="330" r="30" fill="#fee2e2" stroke="#ef4444"/>
		<text x="360" y="334" text-anchor="middle" class="node" fill="#991b1b">Node 5</text>
	</g>
	<text x="262" y="258" text-anchor="middle" class="small" fill="#ef4444">gossip + replication</text>
	<text x="262" y="274" text-anchor="middle" class="small" fill="#ef4444">(O(n²) chatter)</text>

	<!-- pain points -->
	<text x="60" y="400" class="small" fill="#b91c1c">✗ Split-brain &amp; rebalancing on every node change</text>
	<text x="60" y="420" class="small" fill="#b91c1c">✗ Sticky sessions to keep cache affinity</text>
	<text x="60" y="440" class="small" fill="#b91c1c">✗ One region = high latency for distant users</text>

	<text x="262" y="498" text-anchor="middle" class="small" fill="#64748b">Users worldwide → one far-away cluster</text>

	<!-- ============ RIGHT: http-cache global LB ============ -->
	<rect x="532" y="16" width="492" height="588" rx="16" fill="url(#bgR)" stroke="#bfdbfe"/>
	<text x="556" y="50" class="title" fill="#1d4ed8">http-cache: global load balancing + HTTP</text>
	<text x="556" y="70" class="sub">Anycast edge · stateless gateways · shared backends · simple</text>
	<rect x="916" y="34" width="92" height="22" rx="11" fill="#dbeafe" stroke="#93c5fd"/>
	<text x="962" y="49" text-anchor="middle" class="tag" fill="#1d4ed8">prefer</text>

	<!-- clients -->
	<text x="778" y="104" text-anchor="middle" class="small" fill="#475569">Users worldwide (browser / SPA / service)</text>
	<g fill="#e0f2fe" stroke="#38bdf8">
		<rect x="600" y="112" width="64" height="26" rx="6"/>
		<rect x="690" y="112" width="64" height="26" rx="6"/>
		<rect x="780" y="112" width="64" height="26" rx="6"/>
		<rect x="870" y="112" width="64" height="26" rx="6"/>
	</g>

	<!-- global LB -->
	<line x1="778" y1="138" x2="778" y2="160" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
	<rect x="612" y="162" width="332" height="42" rx="10" fill="#1d4ed8"/>
	<text x="778" y="182" text-anchor="middle" class="node" fill="#ffffff">Global Anycast Load Balancer</text>
	<text x="778" y="197" text-anchor="middle" class="small" fill="#bfdbfe">Cloudflare · Fastly · GCP · Azure · AWS</text>

	<!-- regional gateways -->
	<line x1="700" y1="204" x2="660" y2="232" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
	<line x1="856" y1="204" x2="896" y2="232" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
	<g>
		<rect x="566" y="234" width="188" height="74" rx="10" fill="#ffffff" stroke="#60a5fa"/>
		<text x="660" y="256" text-anchor="middle" class="node" fill="#1e3a8a">Gateway · region A</text>
		<text x="660" y="276" text-anchor="middle" class="small" fill="#2563eb">L1/L2 memory (cacheable)</text>
		<text x="660" y="293" text-anchor="middle" class="small" fill="#475569">REST · socket.io · auth</text>

		<rect x="802" y="234" width="188" height="74" rx="10" fill="#ffffff" stroke="#60a5fa"/>
		<text x="896" y="256" text-anchor="middle" class="node" fill="#1e3a8a">Gateway · region B</text>
		<text x="896" y="276" text-anchor="middle" class="small" fill="#2563eb">L1/L2 memory (cacheable)</text>
		<text x="896" y="293" text-anchor="middle" class="small" fill="#475569">REST · socket.io · auth</text>
	</g>

	<!-- shared services row -->
	<line x1="660" y1="308" x2="700" y2="348" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
	<line x1="896" y1="308" x2="856" y2="348" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

	<rect x="612" y="350" width="332" height="56" rx="10" fill="#eff6ff" stroke="#93c5fd"/>
	<text x="778" y="371" text-anchor="middle" class="node" fill="#1e3a8a">Shared storage backends (keyv)</text>
	<text x="778" y="391" text-anchor="middle" class="small" fill="#475569">Redis · Memcache · MongoDB · …</text>

	<!-- supporting services -->
	<g>
		<rect x="566" y="430" width="120" height="48" rx="9" fill="#ffffff" stroke="#cbd5e1"/>
		<text x="626" y="450" text-anchor="middle" class="small" fill="#0f172a" font-weight="600">Statistics</text>
		<text x="626" y="467" text-anchor="middle" class="small" fill="#64748b">ClickHouse</text>

		<rect x="718" y="430" width="120" height="48" rx="9" fill="#ffffff" stroke="#cbd5e1"/>
		<text x="778" y="450" text-anchor="middle" class="small" fill="#0f172a" font-weight="600">Config</text>
		<text x="778" y="467" text-anchor="middle" class="small" fill="#64748b">MongoDB</text>

		<rect x="870" y="430" width="120" height="48" rx="9" fill="#ffffff" stroke="#cbd5e1"/>
		<text x="930" y="450" text-anchor="middle" class="small" fill="#0f172a" font-weight="600">Webhooks/Queue</text>
		<text x="930" y="467" text-anchor="middle" class="small" fill="#64748b">airhorn · qified</text>
	</g>

	<!-- wins -->
	<text x="556" y="512" class="small" fill="#1d4ed8">✓ Each user hits the nearest edge — lowest latency</text>
	<text x="556" y="532" class="small" fill="#1d4ed8">✓ Stateless gateways: add/remove freely, no rebalancing</text>
	<text x="556" y="552" class="small" fill="#1d4ed8">✓ No gossip, no sticky sessions, no split-brain</text>
	<text x="556" y="572" class="small" fill="#1d4ed8">✓ Standard HTTP — caches, CDNs &amp; clients just work</text>
</svg>
